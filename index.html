async function addMatch() {
  const no = parseInt(document.getElementById('a-no').value);
  const stage = document.getElementById('a-stg').value;
  const date = document.getElementById('a-date').value;
  const time = document.getElementById('a-time').value;
  const t1 = document.getElementById('a-t1').value.trim();
  const t2 = document.getElementById('a-t2').value.trim();
  const hc = parseFloat(document.getElementById('a-hc').value)||0;
  if (!no||!t1||!t2) { toast('⚠️ Đầy đủ!'); return; }
  if (S.matches.find(m=>m.no===no)) { toast('⚠️ Trùng số!'); return; }
  const r = await api({action:'addMatch', adminPwd:ADMIN_PWD, no, stage, date, time, t1, t2, handicap:hc});
  if (r?.ok) { toast(`✅ #${no}`); refresh(); }
}
async function setRes(id,r){const x=await api({action:'setResult',adminPwd:ADMIN_PWD,matchId:id,result:r});if(x?.ok){toast('✅');refresh()}}
function calcHcResult(s1, s2, hc) {
  const adj = (Number(s1)-Number(s2)) + (Number(hc)||0);
  if (adj>=0.5) return 1;
  if (adj>0) return 0.5;
  if (adj===0) return 0;
  if (adj>-0.5) return -0.5;
  return -1;
}
function showScoreModal(matchId) {
  const m = S.matches.find(x=>x.id===matchId); if (!m) return;
  showModal(`
    <div class="modal-title">⚽ Nhập tỷ số · #${m.no}</div>
    <div class="match-vs" style="margin-bottom:14px">
      <div class="team">${flagCircle(m.t1)}<div class="team-name">${m.t1}</div></div>
      <div class="vs-badge">VS</div>
      <div class="team">${flagCircle(m.t2)}<div class="team-name">${m.t2}</div></div>
    </div>
    <div class="match-handicap-wrap"><span class="handicap-badge">⚖ Cân bằng: ${m.handicap>0?'+':''}${m.handicap}</span></div>
    <div class="grid-2">
      <div><label>Bàn thắng ${m.t1}</label><input type="number" id="sc1" min="0" max="20" value="${m.score1??''}" placeholder="0" oninput="updateScorePreview('${m.id}')"></div>
      <div><label>Bàn thắng ${m.t2}</label><input type="number" id="sc2" min="0" max="20" value="${m.score2??''}" placeholder="0" oninput="updateScorePreview('${m.id}')"></div>
    </div>
    <div id="score-preview" style="text-align:center;padding:12px;background:var(--surface-2);border-radius:12px;margin-bottom:10px;font-size:.85rem;color:var(--muted)">Nhập tỷ số để xem kết quả tính điểm</div>
    <div class="grid-2">
      <button class="btn btn-outline" onclick="closeModal()">Hủy</button>
      <button class="btn btn-primary" onclick="saveScore('${m.id}')">💾 Lưu</button>
    </div>
  `);
  updateScorePreview(matchId);
}
function updateScorePreview(matchId) {
  const m = S.matches.find(x=>x.id===matchId); if (!m) return;
  const s1 = document.getElementById('sc1').value;
  const s2 = document.getElementById('sc2').value;
  const box = document.getElementById('score-preview');
  if (s1==='' || s2==='') { box.innerHTML = 'Nhập tỷ số để xem kết quả tính điểm'; return; }
  const r = calcHcResult(s1, s2, m.handicap);
  const label = r===1?`<b style="color:var(--green)">✅ ${m.t1} thắng (full)</b>`
              : r===0.5?`<b style="color:var(--orange)">½ ${m.t1} thắng nửa</b>`
              : r===0?`<b style="color:var(--blue)">🤝 Hoà</b>`
              : r===-0.5?`<b style="color:var(--orange)">½ ${m.t2} thắng nửa</b>`
              : `<b style="color:var(--green)">✅ ${m.t2} thắng (full)</b>`;
  box.innerHTML = `<div style="font-size:1.1rem;font-weight:800;color:var(--gold);margin-bottom:4px">${s1} - ${s2}</div>${label}`;
}
async function saveScore(matchId) {
  const s1 = document.getElementById('sc1').value;
  const s2 = document.getElementById('sc2').value;
  if (s1==='' || s2==='') { toast('⚠️ Nhập đủ 2 tỷ số'); return; }
  const r = await api({action:'setScore', adminPwd:ADMIN_PWD, matchId, score1:s1, score2:s2});
  if (r?.ok) { toast('✅ Đã lưu KQ'); closeModal(); refresh(); }
}
async function clrRes(id){const x=await api({action:'clearResult',adminPwd:ADMIN_PWD,matchId:id});if(x?.ok){toast('↩');refresh()}}
async function delMatch(id){if(!confirm('Xóa?'))return;const x=await api({action:'deleteMatch',adminPwd:ADMIN_PWD,matchId:id});if(x?.ok){toast('🗑');refresh()}}
async function resetPlayerPin(id,n){if(!confirm(`Reset PIN của ${n}?`))return;const x=await api({action:'resetPin',adminPwd:ADMIN_PWD,playerId:id});if(x?.ok){toast('✅');refresh()}}

function exportScoresCSV() {
  const stats = allStats();
  const rows = [
    ['Rank','Name','Short','TierId','TierName','TierRate(k)','Predicted','Played','FullWin','HalfWin','Miss','Score','MaxScore','LossPoints','Accuracy%']
  ];
  stats.forEach((s,i)=>{
    const rate = (typeof s.grp.rate==='number'&&!isNaN(s.grp.rate))?s.grp.rate:'';
    const loss = s.maxScore - s.score;
    rows.push([
      i+1, s.pl.name, s.pl.short, s.grp.id, s.grp.name, rate,
      s.bets, s.played, s.fullWin, s.halfWin, s.miss,
      s.score, s.maxScore, loss, (s.accuracy*100).toFixed(1)
    ]);
  });
  const csv = rows.map(r => r.map(c => {
    const v = String(c ?? '');
    return /[",\n]/.test(v) ? `"${v.replace(/"/g,'""')}"` : v;
  }).join(',')).join('\n');
  const blob = new Blob(['﻿'+csv], {type:'text/csv;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `VBCE_WC2026_Scores_${new Date().toISOString().slice(0,10)}.csv`;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  toast('✅ Đã tải CSV');
}

// ═══════════════════════════════════════════════════════════
function showModal(c){document.getElementById('modal-container').innerHTML=`<div class="modal-overlay" onclick="closeModal(event)"><div class="modal" onclick="event.stopPropagation()">${c}</div></div>`}
function closeModal(e){if(!e||e.target.classList.contains('modal-overlay'))document.getElementById('modal-container').innerHTML=''}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2500)}
